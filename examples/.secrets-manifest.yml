        service: inz-tds-ae-apim2-uat
        subscription_id: health-versions-sub
        key: primary

      # --- Static values ---
      - name: env
        value: uat
        secret: false
      - name: baseurl
        value: uatapi.immigration.govt.nz
        secret: false
      - name: td-public-base
        value: https://uatapi.immigration.govt.nz/td-public/v1.0
        secret: false
      - name: grant_type
        value: client_credentials
        secret: false
      - name: tenant
        value: grownz4all.onmicrosoft.com
        secret: false
      - name: scope-tenant
        value: grownz4all.govt.nz
        secret: false
      - name: client_id_td
        value: b04d99e3-d262-44ff-8cd7-9daa6249d8c1
        secret: false
      - name: client_id_paper
        value: f7f1e648-8d08-4cb5-913d-981e10f9f8d3
        secret: false
      - name: testFilePath
        value: test_assets/test.tiff
        secret: false

      # --- Runtime tokens ---
      - name: paper-arrival_oauth_token
        value: ""
        secret: false
      - name: tji_oauth_token
        value: ""
        secret: false
      - name: td_outbound_oauth_token
        value: ""
        secret: false
      - name: paper-declaration-id
        value: ""
        secret: false
      - name: paper-document-id
        value: ""
        secret: false

    outputs:
      - format: postman
        file: postman/environments/UAT.postman_environment.json
      - format: bruno
        file: bruno-collections/NZTD/environments/NZTD-UAT.bru
      - format: dotenv
        file: .env.uat

  pre:
