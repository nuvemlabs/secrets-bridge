# secrets-bridge manifest for NZTD Postman/Bruno API testing
#
# Based on the Travel Declaration System (TD) project.
# Azure resources follow the naming convention:
#   Key Vaults:      inz-tds-ae-td-kv-{env}
#   APIM:            inz-tds-ae-apim2-{env}
#   Resource Groups: inz-tds-ae-td-rg-{env}
#
# Secret names map to Postman environment variable names.
# APIM subscription IDs need discovery via:
#   az apim subscription list --resource-group <rg> --service-name <apim> -o table

project: td-postman
default_provider: azure

environments:
  sit:
    azure:
      subscription: INZ_TDS_SIT
    secrets:
      # --- OAuth client secrets (Key Vault) ---
      - name: client_secret_td
        source: keyvault
        vault: inz-tds-ae-td-kv-sit
        secret: client-secret-td
      - name: client_secret_paper
        source: keyvault
        vault: inz-tds-ae-td-kv-sit
        secret: client-secret-paper
      - name: client_secret_inz-td-app-fa
        source: keyvault
        vault: inz-tds-ae-td-kv-sit
        secret: client-secret-inz-td-app-fa

      # --- APIM subscription keys ---
      # Discover subscription IDs with:
      #   az apim subscription list --resource-group inz-tds-ae-td-rg-sit \
      #     --service-name inz-tds-ae-apim2-sit -o table
      - name: Paper-Ocp-Apim-Subscription-Key
        source: apim-subscription
        resource_group: inz-tds-ae-td-rg-sit
        service: inz-tds-ae-apim2-sit
        subscription_id: paper-sub
        key: primary
      - name: TJI-TD-Ocp-Apim-Subscription-Key
        source: apim-subscription
        resource_group: inz-tds-ae-td-rg-sit
        service: inz-tds-ae-apim2-sit
        subscription_id: tji-td-sub
        key: primary
      - name: cruise-checker-apim
        source: apim-subscription
        resource_group: inz-tds-ae-td-rg-sit
        service: inz-tds-ae-apim2-sit
        subscription_id: cruise-checker-sub
        key: primary
      - name: NZTJ-Ocp-Apim-Subscription-Key
        source: apim-subscription
        resource_group: inz-tds-ae-td-rg-sit
        service: inz-tds-ae-apim2-sit
        subscription_id: nztj-sub
        key: primary
      - name: Ocp-Apim-Subs-Versions
        source: apim-subscription
        resource_group: inz-tds-ae-td-rg-sit
        service: inz-tds-ae-apim2-sit
        subscription_id: health-versions-sub
        key: primary

      # --- Static values (not fetched from cloud) ---
      - name: env
        value: sit
        secret: false
      - name: baseurl
        value: sitapi.immigration.govt.nz
        secret: false
      - name: td-public-base
        value: https://sitapi.immigration.govt.nz/td-public/v1.0
        secret: false
      - name: grant_type
        value: client_credentials
        secret: false
      - name: tenant
        value: grownz4all.onmicrosoft.com
        secret: false
      - name: scope-tenant
        value: grownz4all.govt.nz
        secret: false
      - name: client_id_td
        value: 26a3caf4-0038-4576-80b8-99ae3623762d
        secret: false
      - name: client_id_paper
        value: 3a86dda5-27be-4212-b178-7a4dd81171ff
        secret: false
      - name: client_id_inz-td-app-fa
        value: a1f8219a-1faa-42dc-8778-61e7b20b46fa
        secret: false
      - name: testFilePath
        value: test_assets/test.tiff
        secret: false

      # --- Runtime tokens (empty defaults, populated by Postman scripts) ---
      - name: paper-arrival_oauth_token
        value: ""
        secret: false
      - name: tji_oauth_token
        value: ""
        secret: false
      - name: td_outbound_oauth_token
        value: ""
        secret: false
      - name: paper-declaration-id
        value: ""
        secret: false
      - name: paper-document-id
        value: ""
        secret: false

    outputs:
      - format: postman
        file: postman/environments/SIT.postman_environment.json
      - format: bruno
        file: bruno-collections/NZTD/environments/NZTD-SIT.bru
      - format: dotenv
        file: .env.sit

  uat:
    azure:
      subscription: INZ_TDS_UAT
    secrets:
      # --- OAuth client secrets (Key Vault) ---
